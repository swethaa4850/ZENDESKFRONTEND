<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SocialSift | Agent Profile Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#F4F5FB;
padding:30px;
}

.header{
background:#5B4BAA;
color:white;
padding:20px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.header button{
background:white;
color:#5B4BAA;
padding:10px 18px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.container{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.menu{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:25px;
}

.menu button{
background:#5B4BAA;
color:white;
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.menu button:hover{
background:#47358E;
}

.section{
display:none;
margin-top:20px;
}

.section h2{
margin-bottom:15px;
color:#5B4BAA;
}

input,select{
width:250px;
padding:12px;
margin:8px;
border:1px solid #ccc;
border-radius:8px;
}

button.action{
background:#5B4BAA;
color:white;
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

button.action:hover{
background:#47358E;
}

.deleteBtn{
background:#d32f2f;
}

.deleteBtn:hover{
background:#b71c1c;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th{
background:#5B4BAA;
color:white;
padding:12px;
}

td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

#result{
margin-top:20px;
}

</style>

</head>

<body>

<div class="header">

<h1>👨‍💼 Agent Profile Management</h1>

<button onclick="goDashboard()">
Back Dashboard
</button>

</div>

<div class="container">

<div class="menu">

<button onclick="showSection('addSection')">
➕ Add Agent
</button>

<button onclick="showSection('searchSection')">
🔍 Search Agent
</button>

<button onclick="showSection('viewSection');getAll();">
📋 View All
</button>

<button onclick="showSection('updateSection')">
✏ Update Agent
</button>

<button onclick="showSection('patchSection')">
📝 Patch Agent
</button>

<button onclick="showSection('deleteSection')">
🗑 Delete Agent
</button>

</div>

<!-- ADD -->

<div id="addSection" class="section">

<h2>Add Agent</h2>

<input type="text" id="user" placeholder="User Name">

<input type="text" id="department" placeholder="Department">

<input type="text" id="specialization" placeholder="Specialization">

<input type="number" id="currentLoad" placeholder="Current Load">

<input type="number" id="maxcapacity" placeholder="Max Capacity">

<select id="isavailable">
<option value="true">Available</option>
<option value="false">Not Available</option>
</select>

<br>

<button class="action" onclick="addAgent()">
Save Agent
</button>

</div>

<!-- SEARCH -->

<div id="searchSection" class="section">

<h2>Search Agent</h2>

<input type="number" id="searchId" placeholder="Enter Agent ID">

<button class="action" onclick="getById()">
Search
</button>

<div id="searchResult"></div>

</div>

<!-- VIEW -->

<div id="viewSection" class="section">

<h2>All Agents</h2>

<div id="viewResult"></div>

</div>

<!-- UPDATE -->

<div id="updateSection" class="section">

<h2>Update Agent</h2>

<input type="number" id="updateId" placeholder="Agent ID">

<input type="text" id="updateUser" placeholder="User Name">

<input type="text" id="updateDepartment" placeholder="Department">

<input type="text" id="updateSpecialization" placeholder="Specialization">

<input type="number" id="updateCurrentLoad" placeholder="Current Load">

<input type="number" id="updateMaxcapacity" placeholder="Max Capacity">

<select id="updateAvailable">
<option value="true">Available</option>
<option value="false">Not Available</option>
</select>

<br>

<button class="action" onclick="updateAgent()">
Update Agent
</button>

</div>

<!-- PATCH -->

<div id="patchSection" class="section">

<h2>Patch Agent</h2>

<input type="number" id="patchId" placeholder="Agent ID">

<input type="text" id="patchUser" placeholder="User Name">

<input type="text" id="patchDepartment" placeholder="Department">

<input type="text" id="patchSpecialization" placeholder="Specialization">

<input type="number" id="patchLoad" placeholder="Current Load">

<input type="number" id="patchCapacity" placeholder="Max Capacity">

<select id="patchAvailable">
<option value="">Select Availability</option>
<option value="true">Available</option>
<option value="false">Not Available</option>
</select>

<br>

<button class="action" onclick="patchAgent()">
Patch Agent
</button>

</div>

<!-- DELETE -->

<div id="deleteSection" class="section">

<h2>Delete Agent</h2>

<input type="number" id="deleteId" placeholder="Agent ID">

<button class="action deleteBtn" onclick="deleteAgent()">
Delete Agent
</button>

</div>

<script>

const BASE_URL="https://zendeskbackend2-0.onrender.com/age";

function goDashboard(){

window.location.href="dashboard.html";

}

function showSection(id){

let sections=document.querySelectorAll(".section");

sections.forEach(function(sec){

sec.style.display="none";

});

document.getElementById(id).style.display="block";

}

window.onload=function(){

showSection("addSection");

};
const token = localStorage.getItem("token");

function getHeaders(){
    const headers = {
        "Content-Type": "application/json"
    };
    const tokenVal = localStorage.getItem("token") || token;
    if (tokenVal && tokenVal !== "null" && tokenVal !== "undefined") {
        headers["Authorization"] = "Bearer " + tokenVal;
    }
    return headers;
}



async function addAgent(){

    const data={

        user:document.getElementById("user").value,

        department:document.getElementById("department").value,

        specialization:document.getElementById("specialization").value,

        currentLoad:Number(document.getElementById("currentLoad").value),

        maxcapacity:Number(document.getElementById("maxcapacity").value),

        isavailable:document.getElementById("isavailable").value==="true"

    };

    const res=await fetch(BASE_URL+"/ag",{

        method:"POST",

        headers:getHeaders(),

        body:JSON.stringify(data)

    });

    if(res.ok){

        alert("Agent Added Successfully");

        showSection("viewSection");

        getAll();

    }

    else{

        alert(await res.text());

    }

}



async function getAll(){

    const res=await fetch(BASE_URL+"/ag",{

        method:"GET",

        headers:getHeaders()

    });

    if(!res.ok){

        alert("Unable to fetch data");

        return;

    }

    const data=await res.json();

    let html=`

    <table>

    <tr>

    <th>ID</th>

    <th>User</th>

    <th>Department</th>

    <th>Specialization</th>

    <th>Current Load</th>

    <th>Max Capacity</th>

    <th>Available</th>

    <th>Actions</th>

    </tr>

    `;

    data.forEach(a=>{

        html+=`

        <tr>

        <td>${a.id}</td>

        <td>${a.user}</td>

        <td>${a.department}</td>

        <td>${a.specialization}</td>

        <td>${a.currentLoad}</td>

        <td>${a.maxcapacity}</td>

        <td>${a.isavailable}</td>

        <td>
            <button class="action" style="margin: 2px; padding: 6px 12px;" onclick="editAgentRow(${JSON.stringify(a).replace(/"/g, '&quot;')})">Edit</button>
            <button class="action deleteBtn" style="margin: 2px; padding: 6px 12px;" onclick="deleteAgentRow(${a.id})">Delete</button>
        </td>

        </tr>

        `;

    });

    html+="</table>";

    document.getElementById("viewResult").innerHTML=html;

}

async function getById(){

    const id=document.getElementById("searchId").value;

    const res=await fetch(BASE_URL+"/ag/"+id,{

        method:"GET",

        headers:getHeaders()

    });

    if(!res.ok){

        alert("Agent Not Found");

        return;

    }

    const a=await res.json();

    document.getElementById("searchResult").innerHTML=`

    <table>

    <tr>

    <th>ID</th>

    <th>User</th>

    <th>Department</th>

    <th>Specialization</th>

    <th>Current Load</th>

    <th>Max Capacity</th>

    <th>Available</th>

    <th>Actions</th>

    </tr>

    <tr>

    <td>${a.id}</td>

    <td>${a.user}</td>

    <td>${a.department}</td>

    <td>${a.specialization}</td>

    <td>${a.currentLoad}</td>

    <td>${a.maxcapacity}</td>

    <td>${a.isavailable}</td>

    <td>
        <button class="action" style="margin: 2px; padding: 6px 12px;" onclick="editAgentRow(${JSON.stringify(a).replace(/"/g, '&quot;')})">Edit</button>
        <button class="action deleteBtn" style="margin: 2px; padding: 6px 12px;" onclick="deleteAgentRow(${a.id})">Delete</button>
    </td>

    </tr>

    </table>

    `;

}

function editAgentRow(a) {
    showSection("updateSection");
    document.getElementById("updateId").value = a.id;
    document.getElementById("updateUser").value = a.user;
    document.getElementById("updateDepartment").value = a.department;
    document.getElementById("updateSpecialization").value = a.specialization;
    document.getElementById("updateCurrentLoad").value = a.currentLoad;
    document.getElementById("updateMaxcapacity").value = a.maxcapacity;
    document.getElementById("updateAvailable").value = String(a.isavailable);
    
    // Smooth scroll to update section
    document.getElementById("updateSection").scrollIntoView({ behavior: 'smooth' });
}

async function deleteAgentRow(id) {
    if (confirm("Are you sure you want to delete Agent with ID " + id + "?")) {
        const res = await fetch(BASE_URL + "/ag/" + id, {
            method: "DELETE",
            headers: getHeaders()
        });
        if (res.ok) {
            alert("Agent Deleted Successfully");
            getAll();
        } else {
            alert(await res.text());
        }
    }
}


async function updateAgent(){

    const id=document.getElementById("updateId").value;

    const data={

        user:document.getElementById("updateUser").value,

        department:document.getElementById("updateDepartment").value,

        specialization:document.getElementById("updateSpecialization").value,

        currentLoad:Number(document.getElementById("updateCurrentLoad").value),

        maxcapacity:Number(document.getElementById("updateMaxcapacity").value),

        isavailable:document.getElementById("updateAvailable").value==="true"

    };

    const res=await fetch(BASE_URL+"/ag/"+id,{

        method:"PUT",

        headers:getHeaders(),

        body:JSON.stringify(data)

    });

    if(res.ok){

        alert("Agent Updated Successfully");

        showSection("viewSection");

        getAll();

    }

    else{

        alert(await res.text());

    }

}


async function patchAgent(){

    const id=document.getElementById("patchId").value;

    let data={};

    if(document.getElementById("patchUser").value!="")

        data.user=document.getElementById("patchUser").value;

    if(document.getElementById("patchDepartment").value!="")

        data.department=document.getElementById("patchDepartment").value;

    if(document.getElementById("patchSpecialization").value!="")

        data.specialization=document.getElementById("patchSpecialization").value;

    if(document.getElementById("patchLoad").value!="")

        data.currentLoad=Number(document.getElementById("patchLoad").value);

    if(document.getElementById("patchCapacity").value!="")

        data.maxcapacity=Number(document.getElementById("patchCapacity").value);

    if(document.getElementById("patchAvailable").value!="")

        data.isavailable=document.getElementById("patchAvailable").value==="true";

    const res=await fetch(BASE_URL+"/ag/"+id,{

        method:"PATCH",

        headers:getHeaders(),

        body:JSON.stringify(data)

    });

    if(res.ok){

        alert("Agent Patched Successfully");

        showSection("viewSection");

        getAll();

    }

    else{

        alert(await res.text());

    }

}

// ================= DELETE =================

async function deleteAgent(){

    const id=document.getElementById("deleteId").value;

    const res=await fetch(BASE_URL+"/ag/"+id,{

        method:"DELETE",

        headers:getHeaders()

    });

    if(res.ok){

        alert("Agent Deleted Successfully");

        showSection("viewSection");

        getAll();

    }

    else{

        alert(await res.text());

    }

}

</script>

</body>

</html>
