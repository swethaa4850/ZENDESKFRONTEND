<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zendesk | Ticket Comment Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#F4F5FB;
padding:30px;
}

.header{
background:#5B4BAA;
color:white;
padding:20px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.header button{
background:white;
color:#5B4BAA;
padding:10px 18px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.container{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.menu{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:25px;
}

.menu button{
background:#5B4BAA;
color:white;
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.menu button:hover{
background:#47358E;
}

.section{
display:none;
margin-top:20px;
}

.section h2{
margin-bottom:15px;
color:#5B4BAA;
}

input,textarea{
width:250px;
padding:12px;
margin:8px;
border:1px solid #ccc;
border-radius:8px;
}

textarea{
height:80px;
resize:none;
}

button.action{
background:#5B4BAA;
color:white;
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

button.action:hover{
background:#47358E;
}

.deleteBtn{
background:#E53935;
}

.deleteBtn:hover{
background:#B71C1C;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th{
background:#5B4BAA;
color:white;
padding:12px;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

#result{
margin-top:20px;
}

</style>

</head>

<body>

<div class="header">

<h1>💬 Ticket Comment Management</h1>

<button onclick="goDashboard()">
Back Dashboard
</button>

</div>

<div class="container">

<div class="menu">

<button onclick="showSection('addSection')">
➕ Add Comment
</button>

<button onclick="showSection('searchSection')">
🔍 Search Comment
</button>

<button onclick="showSection('viewSection');getAll();">
📋 View All
</button>

<button onclick="showSection('updateSection')">
✏ Update Comment
</button>

<button onclick="showSection('patchSection')">
📝 Patch Comment
</button>

<button onclick="showSection('deleteSection')">
🗑 Delete Comment
</button>

</div>

<!-- ADD -->

<div id="addSection" class="section">

<h2>Add Ticket Comment</h2>

<input type="number" id="id" placeholder="Comment ID">

<input type="number" id="ticketid" placeholder="Ticket ID">

<input type="number" id="userid" placeholder="User ID">

<textarea id="commenttext" placeholder="Comment Text"></textarea>

<input type="text" id="commentdate" placeholder="Comment Date YYYY-MM-DD">

<br>

<button class="action" onclick="addComment()">
Save Comment
</button>

</div>

<!-- SEARCH -->

<div id="searchSection" class="section">

<h2>Search Comment</h2>

<input type="number" id="searchId" placeholder="Comment ID">

<button class="action" onclick="getById()">
Search
</button>

<div id="searchResult"></div>

</div>

<!-- VIEW -->

<div id="viewSection" class="section">

<h2>All Ticket Comments</h2>

<div id="viewResult"></div>

</div>

<!-- UPDATE -->

<div id="updateSection" class="section">

<h2>Update Comment</h2>

<input type="number" id="updateId" placeholder="Comment ID">

<input type="number" id="updateTicketid" placeholder="Ticket ID">

<input type="number" id="updateUserid" placeholder="User ID">

<textarea id="updateText" placeholder="Comment Text"></textarea>

<input type="text" id="updateDate" placeholder="Comment Date">

<br>

<button class="action" onclick="updateComment()">
Update Comment
</button>

</div>

<!-- PATCH -->

<div id="patchSection" class="section">

<h2>Patch Comment</h2>

<input type="number" id="patchId" placeholder="Comment ID">

<input type="number" id="patchTicketid" placeholder="New Ticket ID">

<input type="number" id="patchUserid" placeholder="New User ID">

<textarea id="patchText" placeholder="New Comment"></textarea>

<input type="text" id="patchDate" placeholder="New Date">

<br>

<button class="action" onclick="patchComment()">
Patch Comment
</button>

</div>

<!-- DELETE -->

<div id="deleteSection" class="section">

<h2>Delete Comment</h2>

<input type="number" id="deleteId" placeholder="Comment ID">

<button class="action deleteBtn" onclick="deleteComment()">
Delete Comment
</button>

</div>

</div>

<script>

const BASE_URL = "https://zendeskbackend2-0.onrender.com/comments";

function goDashboard(){
    window.location.href = "dashboard.html";
}

function showSection(id){
    let sections = document.querySelectorAll(".section");
    sections.forEach(function(sec){
        sec.style.display = "none";
    });
    document.getElementById(id).style.display = "block";
}

window.onload = function(){
    showSection("addSection");
};

function getHeaders(){
    const headers = {
        "Content-Type": "application/json"
    };
    const tokenVal = localStorage.getItem("token");
    if (tokenVal && tokenVal !== "null" && tokenVal !== "undefined") {
        headers["Authorization"] = "Bearer " + tokenVal;
    }
    return headers;
}

// ===================== ADD =====================

async function addComment(){

    let data = {
        id: Number(document.getElementById("id").value),
        ticketid: Number(document.getElementById("ticketid").value),
        userid: Number(document.getElementById("userid").value),
        commenttext: document.getElementById("commenttext").value,
        commentdate: document.getElementById("commentdate").value
    };

    let res = await fetch(BASE_URL + "/postData", {
        method: "POST",
        headers: getHeaders(),
        body: JSON.stringify(data)
    });

    if(res.ok){
        alert("Comment Added Successfully");
        showSection("viewSection");
        getAll();
    } else {
        alert("Add Failed: " + await res.text());
    }
}

// ===================== GET ALL =====================

async function getAll(){

    let res = await fetch(BASE_URL + "/com", {
        method: "GET",
        headers: getHeaders()
    });

    let data = await res.json();

    let html = `
    <table>
    <tr>
    <th>ID</th>
    <th>Ticket ID</th>
    <th>User ID</th>
    <th>Comment</th>
    <th>Date</th>
    <th>Actions</th>
    </tr>
    `;

    data.forEach(c => {
        html += `
        <tr>
        <td>${c.id}</td>
        <td>${c.ticketid}</td>
        <td>${c.userid}</td>
        <td>${c.commenttext}</td>
        <td>${c.commentdate}</td>
        <td>
            <button style="margin:2px;padding:6px 12px;" onclick="editCommentRow(${JSON.stringify(c).replace(/"/g, '&quot;')})">Edit</button>
            <button class="deleteBtn" style="margin:2px;padding:6px 12px;" onclick="deleteCommentRow(${c.id})">Delete</button>
        </td>
        </tr>
        `;
    });

    html += "</table>";
    document.getElementById("viewResult").innerHTML = html;
}

// ===================== GET BY ID =====================

async function getById(){

    let id = document.getElementById("searchId").value;

    let res = await fetch(BASE_URL + "/com/" + id, {
        method: "GET",
        headers: getHeaders()
    });

    if(res.ok){
        let c = await res.json();
        document.getElementById("searchResult").innerHTML = `
        <table>
        <tr>
        <th>ID</th>
        <th>Ticket ID</th>
        <th>User ID</th>
        <th>Comment</th>
        <th>Date</th>
        <th>Actions</th>
        </tr>
        <tr>
        <td>${c.id}</td>
        <td>${c.ticketid}</td>
        <td>${c.userid}</td>
        <td>${c.commenttext}</td>
        <td>${c.commentdate}</td>
        <td>
            <button style="margin:2px;padding:6px 12px;" onclick="editCommentRow(${JSON.stringify(c).replace(/"/g, '&quot;')})">Edit</button>
            <button class="deleteBtn" style="margin:2px;padding:6px 12px;" onclick="deleteCommentRow(${c.id})">Delete</button>
        </td>
        </tr>
        </table>
        `;
    } else {
        alert("Comment Not Found");
    }
}

function editCommentRow(c) {
    showSection("updateSection");
    document.getElementById("updateId").value = c.id;
    document.getElementById("updateTicketid").value = c.ticketid;
    document.getElementById("updateUserid").value = c.userid;
    document.getElementById("updateText").value = c.commenttext;
    document.getElementById("updateDate").value = c.commentdate;
    document.getElementById("updateSection").scrollIntoView({ behavior: 'smooth' });
}

async function deleteCommentRow(id) {
    if (confirm("Are you sure you want to delete Comment with ID " + id + "?")) {
        const res = await fetch(BASE_URL + "/com/" + id, {
            method: "DELETE",
            headers: getHeaders()
        });
        if (res.ok) {
            alert("Comment Deleted Successfully");
            showSection("viewSection");
            getAll();
        } else {
            alert(await res.text());
        }
    }
}

// ===================== UPDATE =====================

async function updateComment(){

    let id = document.getElementById("updateId").value;

    let data = {
        ticketid: Number(document.getElementById("updateTicketid").value),
        userid: Number(document.getElementById("updateUserid").value),
        commenttext: document.getElementById("updateText").value,
        commentdate: document.getElementById("updateDate").value
    };

    let res = await fetch(BASE_URL + "/com/" + id, {
        method: "PUT",
        headers: getHeaders(),
        body: JSON.stringify(data)
    });

    if(res.ok){
        alert("Comment Updated Successfully");
        showSection("viewSection");
        getAll();
    } else {
        alert("Update Failed: " + await res.text());
    }
}

// ===================== PATCH =====================

async function patchComment(){

    let id = document.getElementById("patchId").value;
    let data = {};

    if(document.getElementById("patchTicketid").value !== "")
        data.ticketid = Number(document.getElementById("patchTicketid").value);

    if(document.getElementById("patchUserid").value !== "")
        data.userid = Number(document.getElementById("patchUserid").value);

    if(document.getElementById("patchText").value !== "")
        data.commenttext = document.getElementById("patchText").value;

    if(document.getElementById("patchDate").value !== "")
        data.commentdate = document.getElementById("patchDate").value;

    let res = await fetch(BASE_URL + "/com/" + id, {
        method: "PATCH",
        headers: getHeaders(),
        body: JSON.stringify(data)
    });

    if(res.ok){
        alert("Comment Patched Successfully");
        showSection("viewSection");
        getAll();
    } else {
        alert("Patch Failed: " + await res.text());
    }
}

// ===================== DELETE =====================

async function deleteComment(){

    let id = document.getElementById("deleteId").value;

    let res = await fetch(BASE_URL + "/com/" + id, {
        method: "DELETE",
        headers: getHeaders()
    });

    if(res.ok){
        alert("Comment Deleted Successfully");
        showSection("viewSection");
        getAll();
    } else {
        alert("Delete Failed: " + await res.text());
    }
}

</script>

</body>

</html>
